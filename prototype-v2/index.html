<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家计通 · 暖光版 UI 原型</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="prototype-shell">
    <aside class="proto-nav">
      <p class="proto-tag">暖光 Bento · Youth</p>
      <h1>家计通 · 暖光版</h1>
      <p class="proto-hint">375px 小程序视口 · 左侧切换页面 · 页内按钮可串联流程</p>
      <nav id="screenNav"></nav>
    </aside>
    <main class="device-frame">
      <div class="device-notch"></div>
      <div class="device-screen" id="deviceScreen"></div>
      <div class="device-home-indicator"></div>
    </main>
  </div>

  <!-- P-01 落地页 -->
  <template id="tpl-landing">
    <section class="screen" data-id="landing">
      <div class="screen-body mesh-bg hero-landing">
        <div class="hero-graphic" aria-hidden="true">
          <svg viewBox="0 0 140 140" width="140" height="140">
            <defs>
              <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FF8A7A"/>
                <stop offset="50%" stop-color="#E8A0BF"/>
                <stop offset="100%" stop-color="#B8A4E8"/>
              </linearGradient>
            </defs>
            <circle cx="70" cy="70" r="64" fill="url(#warmGrad)" opacity="0.18"/>
            <path d="M40 88 Q70 52 100 88" stroke="url(#warmGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
            <circle cx="52" cy="58" r="9" fill="#FF8A7A"/>
            <circle cx="88" cy="58" r="9" fill="#B8A4E8"/>
          </svg>
        </div>
        <h1 class="hero-title">刚结婚，也在想<br>什么时候要宝宝？</h1>
        <p class="hero-sub">3 分钟测一测，看看你们小家的预算大概该是多少</p>
        <button class="grad-btn" data-go="quick-1">免费开始测算</button>
        <button class="grad-btn grad-btn-ghost" data-go="login">走完整规划向导</button>
        <button class="text-link text-link-muted" data-go="home-empty">先看看空态首页</button>
        <p class="trust-strip">数据加密 · 不算理财 · 不卖贷款</p>
        <p class="social-note">已有 1,024 对小夫妻生成过规划书</p>
      </div>
    </section>
  </template>

  <!-- P-02 快测 -->
  <template id="tpl-quick-1">
    <section class="screen" data-id="quick-1">
      <header class="screen-header">
        <button class="nav-back" data-go="landing" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>快速测算</span>
        <div class="step-pips"><span class="on"></span><span></span><span></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-heading">你们住在哪？</h2>
        <div class="field-block select-field">上海 <span class="chev">▼</span></div>
        <button class="grad-btn" data-go="quick-2">下一步</button>
        <button class="text-link" data-go="error-city">演示：城市还没覆盖</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-2">
    <section class="screen" data-id="quick-2">
      <header class="screen-header">
        <button class="nav-back" data-go="quick-1" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>快速测算</span>
        <div class="step-pips"><span class="on"></span><span class="on"></span><span></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-heading">家庭月收入（税后）</h2>
        <div class="field-block money-field">¥ <input type="text" value="32,000"></div>
        <p class="hint-text">拖一拖滑块也能快速改</p>
        <input type="range" class="slider-field" min="10000" max="80000" value="32000">
        <button class="grad-btn" data-go="quick-3">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-3">
    <section class="screen" data-id="quick-3">
      <header class="screen-header">
        <button class="nav-back" data-go="quick-2" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>快速测算</span>
        <div class="step-pips"><span class="on"></span><span class="on"></span><span class="on"></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-heading">房贷或房租（每月）</h2>
        <div class="field-block money-field">¥ <input type="text" value="11,000"></div>
        <button class="grad-btn" data-go="quick-result">看看测算结果</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-result">
    <section class="screen" data-id="quick-result">
      <header class="screen-header">
        <button class="nav-back" data-go="quick-3" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>测算结果</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-center">
        <div class="score-display" data-score="78">
          <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fill" style="stroke-dasharray:326;stroke-dashoffset:72"/></svg>
          <div class="score-num">78</div>
        </div>
        <p class="score-caption">家庭财务健康分</p>
        <span class="status-pill status-pill-ok">稳健区间</span>
        <div class="glass-card glass-card-accent">
          <div class="glass-label">合理生活预算区间</div>
          <div class="glass-value">¥8,200 — ¥10,800 / 月</div>
        </div>
        <div class="glass-card glass-card-tip">
          <strong>小建议</strong>
          <p>餐饮可能花得有点多，少点几次外卖，每月大概能省 ¥400–600。</p>
        </div>
        <button class="grad-btn" data-go="login">登录看完整规划书</button>
      </div>
    </section>
  </template>

  <template id="tpl-login">
    <section class="screen" data-id="login">
      <header class="screen-header">
        <button class="nav-back" data-go="quick-result" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>登录</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-center login-panel">
        <div class="brand-mark">家计通</div>
        <p class="login-copy">登录后保存规划书、一起追踪预算<br>数据加密，只用于你们家的财务规划</p>
        <button class="grad-btn grad-btn-wechat" data-action="simulate-login">
          <span class="wechat-badge">微</span> 微信一键登录
        </button>
        <p class="hint-text hint-text-center">登录即表示同意《用户协议》与《隐私政策》</p>
        <p class="hint-text">快测填过的信息会自动带进向导</p>
      </div>
    </section>
  </template>

  <!-- 向导 1–5 -->
  <template id="tpl-wizard-1">
    <section class="screen" data-id="wizard-1">
      <header class="screen-header">
        <button class="nav-back" data-go="landing" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划</span>
        <span class="step-label">1/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span></span><span></span><span></span><span></span></div>
      <div class="screen-body">
        <h2 class="screen-title">你们现在处于哪个阶段？</h2>
        <div class="pick-card">
          <div class="pick-icon"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="8" cy="10" r="3" fill="#FF8A7A"/><circle cx="16" cy="10" r="3" fill="#B8A4E8"/><path d="M4 20c0-3 3-5 8-5s8 2 8 5" stroke="#999" stroke-width="1.5" fill="none"/></svg></div>
          <div><strong>新婚磨合期</strong><br><small>暂时还没打算要娃</small></div>
        </div>
        <div class="pick-card selected">
          <div class="pick-icon"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="8" r="5" fill="#E8A0BF"/><path d="M6 22c0-4 2.5-7 6-7s6 3 6 7" stroke="#999" stroke-width="1.5" fill="none"/></svg></div>
          <div><strong>备孕中</strong><br><small>正在认真准备要宝宝</small></div>
        </div>
        <div class="pick-card">
          <div class="pick-icon"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2" stroke="#B8A4E8" stroke-width="1.5" fill="none"/><line x1="8" y1="3" x2="8" y2="7" stroke="#B8A4E8" stroke-width="1.5"/><line x1="16" y1="3" x2="16" y2="7" stroke="#B8A4E8" stroke-width="1.5"/></svg></div>
          <div><strong>计划未来生育</strong><br><small>选好大概的年份就行</small></div>
        </div>
        <button class="grad-btn" data-go="wizard-2">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-2">
    <section class="screen" data-id="wizard-2">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-1" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划</span>
        <span class="step-label">2/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span class="done"></span><span></span><span></span><span></span></div>
      <div class="screen-body">
        <h2 class="field-heading">所在城市</h2>
        <div class="field-block select-field">上海 <span class="chev">▼</span></div>
        <h2 class="field-heading">家庭月收入（税后）</h2>
        <div class="field-row">
          <div class="field-block money-field money-field-sm">我的 <input type="text" value="18,000"></div>
          <div class="field-block money-field money-field-sm">配偶 <input type="text" value="14,000"></div>
        </div>
        <p class="hint-text hint-text-accent">合计 ¥32,000</p>
        <h2 class="field-heading">收入稳不稳？</h2>
        <div class="pill-group">
          <label class="pill-option selected"><input type="radio" name="stability" checked> 稳定</label>
          <label class="pill-option"><input type="radio" name="stability"> 含奖金</label>
          <label class="pill-option"><input type="radio" name="stability"> 一方波动</label>
        </div>
        <button class="grad-btn" data-go="wizard-3">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-3">
    <section class="screen" data-id="wizard-3">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-2" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划</span>
        <span class="step-label">3/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span class="done"></span><span class="done"></span><span></span><span></span></div>
      <div class="screen-body screen-body-scroll">
        <h2 class="field-heading">房贷或房租 *</h2>
        <div class="field-block money-field">¥ <input type="text" value="11,000"></div>
        <h2 class="field-heading">车贷 / 停车</h2>
        <div class="field-block money-field">¥ <input type="text" value="500"></div>
        <h2 class="field-heading">保险（含社保补充）</h2>
        <div class="field-block money-field">¥ <input type="text" value="800"></div>
        <h2 class="field-heading">赡养父母</h2>
        <div class="field-block money-field">¥ <input type="text" value="2,000"></div>
        <button class="text-link">+ 添加其他固定项</button>
        <div class="stat-strip stat-strip-ok">
          <span>固定支出 ¥14,300</span>
          <span>占收入 44.7%</span>
          <span class="status-pill status-pill-ok">正常</span>
        </div>
        <button class="grad-btn" data-go="wizard-4">下一步</button>
        <button class="text-link" data-go="wizard-3-warn">演示：占比过高</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-3-warn">
    <section class="screen" data-id="wizard-3-warn">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-3" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划</span>
        <span class="step-label">3/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span class="done"></span><span class="done"></span><span></span><span></span></div>
      <div class="screen-body screen-body-scroll">
        <h2 class="field-heading">房贷或房租 *</h2>
        <div class="field-block money-field">¥ <input type="text" value="28,000"></div>
        <div class="stat-strip stat-strip-warn">
          <span>固定支出 ¥29,500</span>
          <span>占收入 92.2%</span>
          <span class="status-pill status-pill-warn">偏高</span>
        </div>
        <button class="grad-btn" data-go="error-imbalance">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-4">
    <section class="screen" data-id="wizard-4">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-3" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划</span>
        <span class="step-label">4/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span><span></span></div>
      <div class="screen-body screen-body-scroll">
        <h2 class="field-heading">每月想存多少</h2>
        <div class="field-block money-field">¥ <input type="text" value="6,400"></div>
        <p class="hint-text">一般建议存收入的 20% 左右</p>
        <h2 class="field-heading">应急金（已经存下的）</h2>
        <div class="field-block money-field">¥ <input type="text" value="50,000"></div>
        <div class="section-divider">备育专项</div>
        <h2 class="field-heading">推荐储备金 <button class="text-link text-link-inline">?</button></h2>
        <div class="field-block money-field">¥ <input type="text" value="80,000"></div>
        <h2 class="field-heading">计划什么时候生</h2>
        <div class="field-block select-field">2027 年 6 月 <span class="chev">▼</span></div>
        <div class="glass-card glass-card-tip">
          <p>距目标还有 <strong>18 个月</strong> · 建议每月储备 <strong>¥4,000</strong></p>
        </div>
        <button class="grad-btn" data-go="wizard-5">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-5">
    <section class="screen" data-id="wizard-5">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-4" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>确认信息</span>
        <span class="step-label">5/5</span>
      </header>
      <div class="wizard-track"><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span></div>
      <div class="screen-body">
        <div class="glass-card kv-list">
          <div class="kv-row"><span>月收入</span><strong>¥32,000</strong></div>
          <div class="kv-row"><span>固定支出</span><strong>¥14,300</strong></div>
          <div class="kv-row"><span>储蓄目标</span><strong>¥6,400</strong></div>
          <div class="kv-row kv-row-highlight"><span>可支配</span><strong>¥11,300</strong></div>
        </div>
        <p class="hint-text hint-text-center">免费版这个月还能再测 1 次</p>
        <button class="grad-btn" data-action="simulate-loading">生成我们的家庭规划书</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-loading">
    <section class="screen" data-id="wizard-loading">
      <div class="loading-screen mesh-bg">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">正在匹配同城消费数据</p>
        <div class="loading-steps">
          <span class="active">匹配城市数据</span>
          <span>推算预算区间</span>
          <span>生成专属建议</span>
        </div>
      </div>
    </section>
  </template>

  <!-- P-08 规划书预览 -->
  <template id="tpl-report">
    <section class="screen" data-id="report">
      <header class="screen-header">
        <button class="nav-back" data-go="wizard-5" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭财务规划书</span>
        <button class="nav-action" data-go="share" aria-label="分享">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M14 10v4H4V4h4M10 2h6v6M8 10l8-8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </button>
      </header>
      <div class="screen-body screen-body-scroll">
        <div class="report-hero">
          <div class="score-display score-display-sm" data-score="82">
            <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fill" style="stroke-dasharray:326;stroke-dashoffset:59"/></svg>
            <div class="score-num">82</div>
          </div>
          <p class="meta-line"><span class="status-pill status-pill-ok">稳健</span> 上海 · 备孕中</p>
          <p class="report-date">生成于 2026-06-11</p>
        </div>
        <div class="metric-row">
          <div><span class="metric-val">20%</span><span class="metric-key">储蓄率</span></div>
          <div><span class="metric-val">45%</span><span class="metric-key">固定占比</span></div>
          <div><span class="metric-val">3.9月</span><span class="metric-key">备用金</span></div>
        </div>
        <h3 class="section-heading">收支总览</h3>
        <div class="glass-card kv-list kv-list-compact">
          <div class="kv-row"><span>月收入</span><strong>¥32,000</strong></div>
          <div class="kv-row"><span>固定支出</span><strong>¥14,300</strong></div>
          <div class="kv-row"><span>储蓄</span><strong>¥6,400</strong></div>
          <div class="kv-row"><span>可支配</span><strong>¥11,300</strong></div>
        </div>
        <h3 class="section-heading">月度预算建议</h3>
        <div class="budget-line"><span>餐饮</span><span>¥3,600</span><span class="budget-pct">11.2%</span></div>
        <div class="budget-line"><span>日用</span><span>¥1,800</span><span class="budget-pct">5.6%</span></div>
        <div class="budget-line budget-line-locked"><span>娱乐</span><span class="blur-lock">¥2,000</span><button class="text-link" data-go="paywall">解锁</button></div>
        <div class="budget-line budget-line-locked"><span>医疗</span><span class="blur-lock">¥1,200</span><button class="text-link" data-go="paywall">解锁</button></div>
        <div class="budget-line budget-line-locked"><span>服饰</span><span class="blur-lock">¥900</span><button class="text-link" data-go="paywall">解锁</button></div>
        <div class="glass-card baby-panel baby-panel-teaser">
          <h3 class="section-heading">备育专项 <span class="status-pill status-pill-warn">摘要</span></h3>
          <p class="hint-text">首年育儿大概多 ¥3,200/月 · 储备进度 40%</p>
          <button class="text-link" data-go="paywall">看完整备育规划 →</button>
        </div>
        <h3 class="section-heading">优化建议</h3>
        <div class="glass-card glass-card-tip glass-card-accent-border">
          <strong>餐饮占比偏高</strong>
          <p>外卖减到每周 ≤3 次，预计月省 ¥400–600。</p>
        </div>

          <div class="tag-row">
            <button class="tag-btn active">已采纳</button>
            <button class="tag-btn">稍后</button>
            <button class="tag-btn">忽略</button>
          </div>
        </div>
        <div class="glass-card action-card">
          <strong>餐饮可以优化</strong>
          <p>外卖频率偏高，建议每周 ≤3 次。</p>
          <ol class="numbered-list">
            <li>定个「在家做饭日」，每周 3 天</li>
          </ol>
          <p class="impact-text">预估：月省 ¥400–600</p>
          <div class="tag-row">
            <button class="tag-btn">已采纳</button>
            <button class="tag-btn">稍后</button>
            <button class="tag-btn">忽略</button>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-partner">
    <section class="screen" data-id="partner">
      <header class="screen-header">
        <button class="nav-back" data-go="report" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>邀请伴侣</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-center">
        <div class="empty-graphic">
          <svg width="56" height="56" viewBox="0 0 56 56"><circle cx="20" cy="22" r="8" fill="#FF8A7A" opacity="0.6"/><circle cx="36" cy="22" r="8" fill="#B8A4E8" opacity="0.6"/><path d="M12 44c0-6 4-10 8-10s8 4 8 10M28 44c0-6 4-10 8-10s8 4 8 10" stroke="#999" stroke-width="1.5" fill="none"/></svg>
        </div>
        <h2 class="screen-title">邀请 TA 一起看</h2>
        <p class="hint-text">共享规划书和预算看板（只读）<br>一起确认小家的预算</p>
        <button class="grad-btn">发送微信邀请</button>
        <div class="glass-card kv-list">
          <div class="kv-row"><span>晓雯（我）</span><strong>管理员</strong></div>
          <div class="kv-row"><span>阿哲（伴侣）</span><strong class="text-muted">待加入</strong></div>
        </div>
        <button class="grad-btn grad-btn-outline" data-go="report-full">共同确认预算</button>
      </div>
    </section>
  </template>

  <template id="tpl-review">
    <section class="screen" data-id="review">
      <header class="screen-header">
        <button class="nav-back" data-go="dashboard" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>5月复盘</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-scroll">
        <div class="glass-card">
          <div class="metric-row metric-row-flat">
            <div><span class="metric-val">87%</span><span class="metric-key">执行率</span></div>
            <div><span class="metric-val">78→82</span><span class="metric-key">健康分</span></div>
          </div>
        </div>
        <h3 class="section-heading">超支 Top</h3>
        <div class="budget-line"><span>1. 娱乐</span><span>+¥400</span><span class="budget-pct budget-pct-danger">超支</span></div>
        <div class="budget-line"><span>2. 餐饮</span><span>+¥180</span><span class="budget-pct budget-pct-danger">超支</span></div>
        <h3 class="section-heading">结余 Top</h3>
        <div class="budget-line"><span>1. 医疗</span><span>-¥200</span><span class="budget-pct">结余</span></div>
        <div class="glass-card glass-card-tip">
          <strong>建议采纳效果</strong>
          <p>餐饮优化已采纳，预计 6 月能省 ¥300。</p>
        </div>
        <button class="grad-btn grad-btn-outline" data-go="report-full">查看完整报告</button>
      </div>
    </section>
  </template>

  <template id="tpl-paywall">
    <section class="screen" data-id="paywall">
      <header class="screen-header">
        <button class="nav-back" data-go="report" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>解锁完整规划</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-scroll">
        <div class="glass-card price-card">
          <div class="price-badge">首发 ¥9.9</div>
          <h3>单次完整报告</h3>
          <p>15–20 页 PDF + 7 天 Pro</p>
          <button class="grad-btn grad-btn-outline" data-go="report-full">立即购买</button>
        </div>
        <div class="glass-card price-card price-card-featured">
          <div class="price-badge">推荐</div>
          <h3>Pro 年付</h3>
          <p class="price-hero">¥68<span>/年</span></p>
          <ul class="check-list">
            <li>无限次测算</li>
            <li>全部建议 + PDF</li>
            <li>月度复盘</li>
          </ul>
          <button class="grad-btn" data-go="report-full">开通 Pro</button>
        </div>
        <div class="glass-card price-card">
          <h3>家庭版 ¥128/年</h3>
          <p>伴侣协同 + 备育模板</p>
          <button class="grad-btn grad-btn-outline" data-go="partner">了解家庭版</button>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-profile">
    <section class="screen" data-id="profile">
      <header class="profile-banner mesh-bg">
        <div class="avatar-circle">晓</div>
        <div><strong>晓雯的家庭</strong><p>上海 · 备孕中 · Pro 至 2027/06</p></div>
      </header>
      <div class="screen-body screen-body-scroll screen-body-tab">
        <div class="menu-stack">
          <button data-go="family-profile">家庭档案 ›</button>
          <button data-go="partner">伴侣管理 ›</button>
          <button data-go="paywall">订阅管理 ›</button>
          <button data-go="report-full">历史规划书 ›</button>
          <button data-go="privacy">数据导出与隐私 ›</button>
          <button>帮助与反馈 ›</button>
        </div>
      </div>
      <nav class="float-nav">
        <button class="float-nav-item" data-go="home">
          <svg width="22" height="22" viewBox="0 0 22 22"><path d="M3 10l8-7 8 7v9H3z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <span>首页</span>
        </button>
        <button class="float-nav-item" data-go="dashboard">
          <svg width="22" height="22" viewBox="0 0 22 22"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="12" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="3" y="12" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="12" y="12" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <span>看板</span>
        </button>
        <button class="float-nav-item active" data-go="profile">
          <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="8" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M4 20c0-4 3-7 7-7s7 3 7 7" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <span>我的</span>
        </button>
      </nav>
    </section>
  </template>

  <template id="tpl-family-profile">
    <section class="screen" data-id="family-profile">
      <header class="screen-header">
        <button class="nav-back" data-go="profile" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>家庭档案</span>
        <button class="text-link">保存</button>
      </header>
      <div class="screen-body screen-body-scroll">
        <h2 class="field-heading">家庭名称</h2>
        <div class="field-block"><input type="text" value="晓雯的家庭" class="text-input"></div>
        <h2 class="field-heading">所在城市</h2>
        <div class="field-block select-field">上海 <span class="chev">▼</span></div>
        <h2 class="field-heading">家庭阶段</h2>
        <div class="pill-group pill-group-vertical">
          <label class="pill-option"><input type="radio" name="stage"> 新婚磨合期</label>
          <label class="pill-option selected"><input type="radio" name="stage" checked> 备孕中</label>
          <label class="pill-option"><input type="radio" name="stage"> 计划未来生育</label>
        </div>
        <p class="hint-text">阶段改了会建议重新测算</p>
        <button class="grad-btn" data-go="wizard-1">重新测算</button>
      </div>
    </section>
  </template>

  <template id="tpl-privacy">
    <section class="screen" data-id="privacy">
      <header class="screen-header">
        <button class="nav-back" data-go="profile" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>隐私与导出</span>
        <span></span>
      </header>
      <div class="screen-body screen-body-scroll">
        <div class="menu-stack menu-stack-flush">
          <button>导出规划书 PDF</button>
          <button>导出预算数据 CSV</button>
          <button>查看隐私政策</button>
          <button class="text-danger">注销账号并删除数据</button>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-error-city">
    <section class="screen" data-id="error-city">
      <header class="screen-header">
        <button class="nav-back" data-go="quick-1" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <span>选择城市</span>
        <span></span>
      </header>
      <div class="screen-body">
        <div class="field-block select-field">临沂 <span class="chev">▼</span></div>
        <div class="alert-banner">您的城市即将开放，暂按<strong>新一线标准</strong>估算，结果会标注为「估算值」</div>
        <button class="grad-btn" data-go="quick-2">继续测算</button>
      </div>
    </section>
  </template>

  <template id="tpl-error-imbalance">
    <section class="screen" data-id="error-imbalance">
      <div class="screen-body screen-body-center empty-state">
        <div class="empty-graphic empty-graphic-warn">
          <svg width="56" height="56" viewBox="0 0 56 56"><path d="M28 8L6 48h44L28 8z" fill="#FFF5EB" stroke="#F5A623" stroke-width="2"/><line x1="28" y1="22" x2="28" y2="34" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/><circle cx="28" cy="40" r="2" fill="#F5A623"/></svg>
        </div>
        <h2 class="screen-title">收支严重失衡</h2>
        <p class="hint-text">固定支出占收入 92%，没法生成合理预算<br>建议先优化固定开支或调整储蓄目标</p>
        <div class="glass-card glass-card-tip">
          <strong>可以试试</strong>
          <ol class="numbered-list">
            <li>看看有没有能合并或削减的固定项</li>
            <li>暂时降低储蓄目标，先保障基本生活</li>
            <li>联系 1v1 规划咨询（可选）</li>
          </ol>
        </div>
        <button class="grad-btn" data-go="wizard-3-warn">返回修改</button>
        <button class="grad-btn grad-btn-ghost" data-go="landing">退出</button>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
