<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家计通 · UI 原型</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="prototype-shell">
    <aside class="proto-nav">
      <h1>家计通 UI 原型</h1>
      <p class="proto-hint">375px 小程序视口 · 左侧切换页面 · 页内按钮可串联流程</p>
      <nav id="screenNav"></nav>
    </aside>
    <main class="device-frame">
      <div class="device-notch"></div>
      <div class="device-screen" id="deviceScreen"></div>
      <div class="device-home-indicator"></div>
    </main>
  </div>

  <!-- P-01 -->
  <template id="tpl-landing">
    <section class="screen" data-id="landing">
      <div class="screen-body landing">
        <div class="hero-illustration" aria-hidden="true">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle cx="60" cy="60" r="56" fill="#E8F5F2"/>
            <path d="M35 75 Q60 45 85 75" stroke="#2D8B7A" stroke-width="3" fill="none"/>
            <circle cx="45" cy="52" r="8" fill="#E8956A"/>
            <circle cx="75" cy="52" r="8" fill="#2D8B7A"/>
          </svg>
        </div>
        <h1 class="landing-title">刚结婚，准备要娃？<br>3 分钟知道合理家庭预算</h1>
        <p class="landing-sub">基于城市、收入与家庭结构，科学测算你的家庭财务规划</p>
        <button class="btn btn-primary" data-go="quick-1">免费开始测算</button>
        <button class="btn btn-ghost" data-go="login">完整规划向导</button>
        <button class="btn btn-ghost btn-sm-text" data-go="home-empty">查看空态首页</button>
        <p class="trust-bar">数据加密 · 不算理财 · 不卖贷款</p>
        <p class="social-proof">已为 1,024 个家庭生成规划书</p>
      </div>
    </section>
  </template>

  <!-- P-02 steps -->
  <template id="tpl-quick-1">
    <section class="screen" data-id="quick-1">
      <header class="top-bar">
        <button class="icon-btn back" data-go="landing" aria-label="返回">←</button>
        <span>快速测算</span>
        <div class="step-dots"><span class="on"></span><span></span><span></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-label">你所在的城市？</h2>
        <div class="select-field">上海 <span>▼</span></div>
        <button class="btn btn-primary" data-go="quick-2">下一步</button>
        <button class="link-btn align-left" data-go="error-city">演示：城市未覆盖</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-2">
    <section class="screen" data-id="quick-2">
      <header class="top-bar">
        <button class="icon-btn back" data-go="quick-1" aria-label="返回">←</button>
        <span>快速测算</span>
        <div class="step-dots"><span class="on"></span><span class="on"></span><span></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-label">家庭月收入（税后）</h2>
        <div class="amount-field">¥ <input type="text" value="32,000"></div>
        <p class="field-hint">可拖动滑块快速调整</p>
        <input type="range" class="range-input" min="10000" max="80000" value="32000">
        <button class="btn btn-primary" data-go="quick-3">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-3">
    <section class="screen" data-id="quick-3">
      <header class="top-bar">
        <button class="icon-btn back" data-go="quick-2" aria-label="返回">←</button>
        <span>快速测算</span>
        <div class="step-dots"><span class="on"></span><span class="on"></span><span class="on"></span></div>
      </header>
      <div class="screen-body">
        <h2 class="field-label">房贷或房租（月）</h2>
        <div class="amount-field">¥ <input type="text" value="11,000"></div>
        <button class="btn btn-primary" data-go="quick-result">查看测算结果</button>
      </div>
    </section>
  </template>

  <template id="tpl-quick-result">
    <section class="screen" data-id="quick-result">
      <header class="top-bar">
        <button class="icon-btn back" data-go="quick-3" aria-label="返回">←</button>
        <span>测算结果</span>
        <span></span>
      </header>
      <div class="screen-body center">
        <div class="score-ring">
          <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fill" style="stroke-dasharray:326;stroke-dashoffset:72"/></svg>
          <div class="score-num">78</div>
        </div>
        <p class="score-label">家庭财务健康分</p>
        <span class="badge badge-green">稳健区间</span>
        <div class="card highlight-card">
          <div class="card-caption">合理生活预算区间</div>
          <div class="card-value">¥8,200 — ¥10,800 / 月</div>
        </div>
        <div class="tip-card">
          <strong>建议</strong>
          <p>餐饮占比可能偏高，建议关注外卖频率，预计月省 ¥400–600。</p>
        </div>
        <button class="btn btn-primary" data-go="login">登录查看完整规划书</button>
      </div>
    </section>
  </template>

  <template id="tpl-login">
    <section class="screen" data-id="login">
      <header class="top-bar">
        <button class="icon-btn back" data-go="quick-result" aria-label="返回">←</button>
        <span>登录</span>
        <span></span>
      </header>
      <div class="screen-body center login-body">
        <div class="login-logo">家计通</div>
        <p class="login-desc">登录后保存规划书、追踪预算<br>数据加密存储，仅用于财务规划</p>
        <button class="btn btn-wechat" data-action="simulate-login">
          <span class="wechat-icon">微</span> 微信一键登录
        </button>
        <p class="login-legal">登录即表示同意《用户协议》与《隐私政策》</p>
        <p class="field-hint">快测数据将自动带入完整向导</p>
      </div>
    </section>
  </template>

  <!-- Wizard 1-5 -->
  <template id="tpl-wizard-1">
    <section class="screen" data-id="wizard-1">
      <header class="top-bar">
        <button class="icon-btn back" data-go="landing" aria-label="返回">←</button>
        <span>家庭财务规划</span>
        <span class="step-text">1/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span></span><span></span><span></span><span></span></div>
      <div class="screen-body">
        <h2 class="section-title">你们目前处于哪个阶段？</h2>
        <div class="option-card">
          <div class="option-icon">💑</div>
          <div><strong>新婚磨合期</strong><br><small>暂无生育计划</small></div>
        </div>
        <div class="option-card selected">
          <div class="option-icon">🤰</div>
          <div><strong>备孕中</strong><br><small>正在准备要宝宝</small></div>
        </div>
        <div class="option-card">
          <div class="option-icon">📅</div>
          <div><strong>计划未来生育</strong><br><small>选择预计年份</small></div>
        </div>
        <button class="btn btn-primary" data-go="wizard-2">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-2">
    <section class="screen" data-id="wizard-2">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-1" aria-label="返回">←</button>
        <span>家庭财务规划</span>
        <span class="step-text">2/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span class="done"></span><span></span><span></span><span></span></div>
      <div class="screen-body">
        <h2 class="field-label">所在城市</h2>
        <div class="select-field">上海 <span>▼</span></div>
        <h2 class="field-label">家庭月收入（税后）</h2>
        <div class="income-split">
          <div class="amount-field sm">我的 <input type="text" value="18,000"></div>
          <div class="amount-field sm">配偶 <input type="text" value="14,000"></div>
        </div>
        <p class="income-total">合计 ¥32,000</p>
        <h2 class="field-label">收入稳定性</h2>
        <div class="radio-row">
          <label class="radio-chip selected"><input type="radio" name="stability" checked> 稳定</label>
          <label class="radio-chip"><input type="radio" name="stability"> 含奖金</label>
          <label class="radio-chip"><input type="radio" name="stability"> 一方波动</label>
        </div>
        <button class="btn btn-primary" data-go="wizard-3">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-3">
    <section class="screen" data-id="wizard-3">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-2" aria-label="返回">←</button>
        <span>家庭财务规划</span>
        <span class="step-text">3/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span class="done"></span><span class="done"></span><span></span><span></span></div>
      <div class="screen-body scroll">
        <h2 class="field-label">房贷或房租 *</h2>
        <div class="amount-field">¥ <input type="text" value="11,000"></div>
        <h2 class="field-label">车贷 / 停车</h2>
        <div class="amount-field">¥ <input type="text" value="500"></div>
        <h2 class="field-label">保险（含社保补充）</h2>
        <div class="amount-field">¥ <input type="text" value="800"></div>
        <h2 class="field-label">赡养父母</h2>
        <div class="amount-field">¥ <input type="text" value="2,000"></div>
        <button class="link-btn align-left">+ 添加其他固定项</button>
        <div class="summary-bar ok">
          <span>固定支出 ¥14,300</span>
          <span>占收入 44.7%</span>
          <span class="badge badge-green">正常</span>
        </div>
        <button class="btn btn-primary" data-go="wizard-4">下一步</button>
        <button class="link-btn align-left" data-go="wizard-3-warn">演示：占比过高</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-3-warn">
    <section class="screen" data-id="wizard-3-warn">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-3" aria-label="返回">←</button>
        <span>家庭财务规划</span>
        <span class="step-text">3/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span class="done"></span><span class="done"></span><span></span><span></span></div>
      <div class="screen-body scroll">
        <h2 class="field-label">房贷或房租 *</h2>
        <div class="amount-field">¥ <input type="text" value="28,000"></div>
        <div class="summary-bar warn">
          <span>固定支出 ¥29,500</span>
          <span>占收入 92.2%</span>
          <span class="badge badge-yellow">偏高</span>
        </div>
        <button class="btn btn-primary" data-go="error-imbalance">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-4">
    <section class="screen" data-id="wizard-4">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-3" aria-label="返回">←</button>
        <span>家庭财务规划</span>
        <span class="step-text">4/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span><span></span></div>
      <div class="screen-body scroll">
        <h2 class="field-label">每月储蓄目标</h2>
        <div class="amount-field">¥ <input type="text" value="6,400"></div>
        <p class="field-hint">建议为收入的 20%</p>
        <h2 class="field-label">当前应急金（已存）</h2>
        <div class="amount-field">¥ <input type="text" value="50,000"></div>
        <div class="section-divider">备育专项</div>
        <h2 class="field-label">推荐储备金 <button class="link-btn inline">?</button></h2>
        <div class="amount-field">¥ <input type="text" value="80,000"></div>
        <h2 class="field-label">计划生育时间</h2>
        <div class="select-field">2027 年 6 月 <span>▼</span></div>
        <div class="card baby-hint">
          <p>距目标还有 <strong>18 个月</strong> · 建议每月储备 <strong>¥4,000</strong></p>
        </div>
        <button class="btn btn-primary" data-go="wizard-5">下一步</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-5">
    <section class="screen" data-id="wizard-5">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-4" aria-label="返回">←</button>
        <span>确认信息</span>
        <span class="step-text">5/5</span>
      </header>
      <div class="progress-steps"><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span><span class="done"></span></div>
      <div class="screen-body">
        <div class="card confirm-card">
          <div class="confirm-row"><span>月收入</span><strong>¥32,000</strong></div>
          <div class="confirm-row"><span>固定支出</span><strong>¥14,300</strong></div>
          <div class="confirm-row"><span>储蓄目标</span><strong>¥6,400</strong></div>
          <div class="confirm-row highlight"><span>可支配</span><strong>¥11,300</strong></div>
        </div>
        <p class="field-hint center-text">免费版本月还可测算 1 次</p>
        <button class="btn btn-primary" data-action="simulate-loading">生成我的家庭规划书</button>
      </div>
    </section>
  </template>

  <template id="tpl-wizard-loading">
    <section class="screen" data-id="wizard-loading">
      <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">匹配上海消费数据…</p>
        <div class="loading-steps">
          <span class="active">匹配城市数据</span>
          <span>推算预算区间</span>
          <span>生成专属建议</span>
        </div>
      </div>
    </section>
  </template>

  <!-- P-08 Report preview -->
  <template id="tpl-report">
    <section class="screen" data-id="report">
      <header class="top-bar">
        <button class="icon-btn back" data-go="wizard-5" aria-label="返回">←</button>
        <span>家庭财务规划书</span>
        <button class="icon-btn" data-go="share" aria-label="分享">↗</button>
      </header>
      <div class="screen-body scroll">
        <div class="report-header center">
          <div class="score-ring sm">
            <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fill" style="stroke-dasharray:326;stroke-dashoffset:59"/></svg>
            <div class="score-num">82</div>
          </div>
          <p class="meta-line"><span class="badge badge-green">🟢 稳健</span> 上海 · 备孕中</p>
          <p class="report-date">生成于 2026-06-11</p>
        </div>
        <div class="stat-row">
          <div><span class="stat-val">20%</span><span class="stat-key">储蓄率</span></div>
          <div><span class="stat-val">45%</span><span class="stat-key">固定占比</span></div>
          <div><span class="stat-val">3.9月</span><span class="stat-key">备用金</span></div>
        </div>
        <h3 class="block-title">收支总览</h3>
        <div class="card confirm-card compact">
          <div class="confirm-row"><span>月收入</span><strong>¥32,000</strong></div>
          <div class="confirm-row"><span>固定支出</span><strong>¥14,300</strong></div>
          <div class="confirm-row"><span>储蓄</span><strong>¥6,400</strong></div>
          <div class="confirm-row"><span>可支配</span><strong>¥11,300</strong></div>
        </div>
        <h3 class="block-title">月度预算建议</h3>
        <div class="budget-row"><span>餐饮</span><span>¥3,600</span><span class="range">11.2%</span></div>
        <div class="budget-row"><span>日用</span><span>¥1,800</span><span class="range">5.6%</span></div>
        <div class="budget-row locked"><span>娱乐</span><span class="blur">¥2,000</span><button class="link-btn" data-go="paywall">解锁</button></div>
        <div class="budget-row locked"><span>医疗</span><span class="blur">¥1,200</span><button class="link-btn" data-go="paywall">解锁</button></div>
        <div class="budget-row locked"><span>服饰</span><span class="blur">¥900</span><button class="link-btn" data-go="paywall">解锁</button></div>
        <div class="baby-section teaser">
          <h3 class="block-title">备育专项 <span class="badge badge-yellow">摘要</span></h3>
          <p class="field-hint">首年育儿增量约 ¥3,200/月 · 储备进度 40%</p>
          <button class="link-btn" data-go="paywall">查看完整备育规划 →</button>
        </div>
        <h3 class="block-title">优化建议</h3>
        <div class="tip-card accent-border">
          <strong>餐饮占比偏高</strong>
          <p>建议减少外卖至每周 ≤3 次，预计月省 ¥400–600。</p>
        </div>
        <div class="tip-card locked-card">
          <p class="blur-text">还有 4 条专属建议…</p>
          <button class="btn btn-secondary btn-sm" data-go="paywall">开通 Pro 查看全部</button>
        </div>
        <h3 class="block-title">下一步</h3>
        <div class="checklist">
          <button class="check-item done" data-go="dashboard">✓ 启用预算追踪</button>
          <button class="check-item" data-go="partner">邀请伴侣一起查看</button>
          <button class="check-item" data-go="setup-reminder">设置周度填报提醒</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" data-go="paywall">¥19.9 完整报告</button>
          <button class="btn btn-secondary" data-go="report-full">预览完整版</button>
        </div>
      </div>
    </section>
  </template>

  <!-- P-09 Full report -->
  <template id="tpl-report-full">
    <section class="screen" data-id="report-full">
      <header class="top-bar">
        <button class="icon-btn back" data-go="report" aria-label="返回">←</button>
        <span>完整规划书</span>
        <button class="link-btn">PDF</button>
      </header>
      <div class="screen-body scroll">
        <div class="report-header center">
          <div class="score-ring sm"><div class="score-num">82</div></div>
          <p class="meta-line"><span class="badge badge-green">🟢 稳健</span> 上海 · 备孕中</p>
        </div>
        <h3 class="block-title">月度预算（7 大类）</h3>
        <div class="budget-row"><span>餐饮</span><span>¥3,600</span><span class="range">2,700–4,500</span></div>
        <div class="budget-row"><span>日用</span><span>¥1,800</span><span class="range">1,350–2,250</span></div>
        <div class="budget-row"><span>娱乐</span><span>¥2,000</span><span class="range">1,500–2,500</span></div>
        <div class="budget-row"><span>医疗</span><span>¥1,200</span><span class="range">900–1,500</span></div>
        <div class="budget-row"><span>服饰</span><span>¥900</span><span class="range">675–1,125</span></div>
        <div class="budget-row"><span>交通通讯</span><span>¥600</span><span class="range">450–750</span></div>
        <div class="budget-row"><span>其他</span><span>¥1,200</span><span class="range">900–1,500</span></div>
        <button class="expand-row" data-toggle="basis-1">餐饮 计算依据 ▼</button>
        <div class="expand-panel" id="basis-1">
          <p>基准 ¥2,100 × 家庭系数 1.8 × 城市系数 1.35 = ¥5,103 → 归一 ¥3,600</p>
          <p class="field-hint">数据来源：城镇消费支出统计 2025Q1</p>
        </div>
        <div class="baby-section">
          <h3 class="block-title">备育专项</h3>
          <div class="confirm-row"><span>首年育儿增量</span><strong>¥3,200/月</strong></div>
          <div class="confirm-row"><span>储备目标</span><strong>¥80,000</strong></div>
          <div class="confirm-row"><span>已储备</span><strong>¥32,000 (40%)</strong></div>
          <div class="confirm-row"><span>距计划生育</span><strong>18 个月</strong></div>
          <div class="progress-bar"><div class="progress-fill" style="width:40%"></div></div>
        </div>
        <h3 class="block-title">抗风险报告</h3>
        <div class="card risk-card">
          <div class="risk-item ok"><span>备用金</span><span>3.9 个月 🟢</span></div>
          <div class="risk-item ok"><span>固定支出占比</span><span>45% 🟢</span></div>
          <div class="risk-item warn"><span>储蓄率</span><span>20% 🟡</span></div>
          <p class="field-hint">备育前建议备用金 ≥ 6 个月</p>
        </div>
        <h3 class="block-title">优化建议 (5)</h3>
        <div class="action-card warn">
          <strong>备育储备压力</strong>
          <ol class="action-list">
            <li>娱乐预算从 ¥2,000 调至 ¥1,500</li>
            <li>设立备育专户自动转 ¥3,000/月</li>
          </ol>
